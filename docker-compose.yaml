services:
  node1:
    build: .
    container_name: blockchain-node-1
    environment:
      NODE_ADDR: ":3000"
      HTTP_ADDR: ":8080"
      CHAIN_PATH: "/data/chain.json"
      PEERS: "node2:3000"
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - node1-data:/data

  node2:
    build: .
    container_name: blockchain-node-2
    environment:
      NODE_ADDR: ":3000"
      HTTP_ADDR: ":8080"
      CHAIN_PATH: "/data/chain.json"
      PEERS: "node1:3000"
    ports:
      - "3001:3000"
      - "8081:8080"
    depends_on:
      - node1
    volumes:
      - node2-data:/data

volumes:
  node1-data:
  node2-data:
